<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUBX VIRAL 2.0 - Playing</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plyr-color-main: #ff4500; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding-bottom: 90px; }
        ::-webkit-scrollbar { display: none; }
        .tube-header { background: #000; border-bottom: 2px solid #ff4500; }
        .action-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: #666; cursor: pointer; transition: 0.2s; font-weight: bold; text-transform: uppercase; }
        .action-btn.active { color: #ff4500; }
        
        /* Profile UI */
        .profile-container { background: #111; border: 1px solid #222; border-radius: 30px; padding: 30px 20px; }
        .info-row { background: #000; border: 1px solid #222; border-radius: 15px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .info-label { font-size: 10px; font-weight: 900; color: #555; text-transform: uppercase; }
        .info-value { font-size: 11px; font-weight: 800; color: #fff; }
        .premium-text { color: #ff4500; }

        /* Comment Tab */
        #comment-tab { position: fixed; bottom: 0; left: 0; right: 0; height: 75%; background: #0f0f0f; border-top: 2px solid #ff4500; z-index: 1000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 25px 25px 0 0; }
        #comment-tab.open { transform: translateY(0); }
        .comment-bubble { background: #1a1a1a; padding: 12px; border-radius: 15px; border-bottom-left-radius: 2px; }

        /* Suggestion Cards */
        .suggested-card { background: #111; border-radius: 16px; border: 1px solid #1a1a1a; transition: 0.3s; }
        .duration-tag { background: rgba(0,0,0,0.85); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; bottom: 8px; right: 8px; position: absolute; font-weight: 900; }

        /* Index Consistent Support UI */
        #support-modal { background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(8px); position: fixed; inset: 0; display: none; flex-direction: column; }
        .floating-support { position: fixed; bottom: 100px; right: 20px; background: linear-gradient(135deg, #ff4500, #ff8c00); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; box-shadow: 0 10px 20px rgba(255, 69, 0, 0.4); z-index: 999; animation: bounce 2s infinite; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 13px; margin-bottom: 8px; position: relative; }
        .chat-user { background: #ff4500; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-admin { background: #222; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

    <div onclick="toggleSupport()" class="floating-support"><i class="fas fa-comments"></i></div>

    <div id="support-modal" class="flex-col">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#ff4500] rounded-full flex items-center justify-center text-[10px]">AD</div>
                <div>
                    <h3 class="text-sm font-bold">HubX Viral Admin</h3>
                    <p class="text-[10px] text-green-500">Online</p>
                </div>
            </div>
            <button onclick="toggleSupport()" class="text-gray-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-2"></div>
        <div class="p-4 bg-[#111] border-t border-gray-800">
            <div class="flex gap-2 items-center bg-black p-2 rounded-2xl border border-gray-800">
                <button onclick="document.getElementById('chatFile').click()" class="text-gray-500 px-2"><i class="fas fa-image"></i></button>
                <input type="file" id="chatFile" class="hidden" accept="image/*" onchange="sendImage(this)">
                <input type="text" id="chatMsg" placeholder="Message..." class="flex-1 bg-transparent text-sm outline-none">
                <button onclick="sendText()" class="bg-[#ff4500] w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <header class="tube-header p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fas fa-arrow-left text-gray-400 cursor-pointer" onclick="handleBack()"></i>
            <h1 class="text-xl font-black italic tracking-tighter uppercase text-[#ff4500]">HUBX <span class="text-white">VIRAL 2.0</span></h1>
        </div>
        <div id="top-user-icon" class="w-8 h-8 bg-[#ff4500] rounded-full border-2 border-white/10 flex items-center justify-center text-xs font-bold overflow-hidden">U</div>
    </header>

    <div id="play-view">
        <div class="bg-black aspect-video"><video id="player" playsinline controls crossorigin></video></div>
        <div class="p-4">
            <h1 id="v-title" class="text-lg font-bold text-gray-100">Loading...</h1>
            <div class="flex items-center gap-3 mt-2 text-[10px] text-gray-500 font-black uppercase tracking-tighter">
                <span><i class="fas fa-eye text-[#ff4500] mr-1"></i> <span id="v-views">0</span> VIEWS</span>
            </div>
            <div class="flex justify-around mt-6 py-4 border-y border-gray-900">
                <div class="action-btn" id="likeBtn" onclick="handleVote('likes')"><i class="fas fa-thumbs-up text-lg"></i> <span id="v-likes">0</span></div>
                <div class="action-btn" id="dislikeBtn" onclick="handleVote('dislikes')"><i class="fas fa-thumbs-down text-lg"></i> <span id="v-dislikes">0</span></div>
                <div class="action-btn" onclick="downloadVideo()"><i class="fas fa-download text-lg text-blue-500"></i> <span>GET</span></div>
                <div class="action-btn" id="saveBtn" onclick="toggleSave()"><i class="fas fa-bookmark text-lg"></i> <span id="saveLabel">SAVE</span></div>
                <div class="action-btn" onclick="reportVideo()"><i class="fas fa-flag text-lg text-red-500"></i> <span>REPORT</span></div>
                <div class="action-btn" onclick="shareVideo()"><i class="fas fa-share-nodes text-lg text-green-500"></i> <span>SHARE</span></div>
            </div>
            <div class="mt-4 bg-[#111] p-4 rounded-2xl flex justify-between items-center border border-gray-800 shadow-lg" onclick="toggleComments(true)">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Comments</span>
                    <span id="v-comment-count" class="bg-[#ff4500] text-white text-[9px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <i class="fas fa-chevron-up text-gray-600 text-xs"></i>
            </div>
        </div>
        <div class="p-4">
            <h3 class="text-[10px] font-black uppercase text-gray-500 mb-4 tracking-widest px-1">Up Next / Related</h3>
            <div id="related-grid" class="space-y-4"></div>
        </div>
    </div>
        <div id="comment-tab">
        <div class="p-4 flex justify-between items-center border-b border-gray-900">
            <h2 class="text-xs font-black uppercase tracking-widest text-gray-400">Public Comments</h2>
            <i class="fas fa-times text-gray-600 p-2" onclick="toggleComments(false)"></i>
        </div>
        <div id="comment-list" class="p-4 overflow-y-auto h-[calc(100%-130px)] space-y-6"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-[#0f0f0f] border-t border-gray-900 flex gap-2 items-center">
            <div id="p-comment-avatar" class="w-8 h-8 rounded-full bg-gray-800 flex-shrink-0 overflow-hidden text-[10px] flex items-center justify-center font-bold">?</div>
            <input type="text" id="comment-input" placeholder="Add a public comment..." class="flex-1 bg-black border border-gray-800 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:border-[#ff4500]">
            <button onclick="postComment()" class="bg-[#ff4500] w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fas fa-paper-plane text-xs"></i></button>
        </div>
    </div>

    <div id="profile-view" class="hidden p-6">
        <div class="profile-container text-center relative shadow-2xl">
            <div class="relative w-32 h-32 mx-auto mb-4">
                <div id="p-avatar-box" class="w-full h-full bg-[#ff4500] rounded-full flex items-center justify-center text-5xl font-black border-4 border-black overflow-hidden shadow-xl">U</div>
                <label for="imgInp" class="absolute bottom-1 right-1 bg-[#ff4500] w-9 h-9 rounded-full border-4 border-[#111] flex items-center justify-center cursor-pointer"><i class="fas fa-camera text-white text-[10px]"></i></label>
                <input type="file" id="imgInp" class="hidden" onchange="uploadToImgBB(this)">
            </div>
            <h2 class="text-2xl font-black mb-1" id="p-name">Loading...</h2>
            <p class="text-gray-600 text-[10px] mb-8 font-bold" id="p-username">@loading</p>
            <div class="space-y-3">
                <div class="info-row"><span class="info-label">Status</span><span id="p-acc-type" class="info-value premium-text">FREE USER</span></div>
                <div id="expiry-box" class="hidden info-row"><span class="info-label text-yellow-500">Expires In</span><span id="p-expiry" class="info-value">--</span></div>
                <div class="info-row"><span class="info-label">Joined Date</span><span id="p-joined" class="info-value">--/--/----</span></div>
            </div>
            <button onclick="auth.signOut()" class="w-full mt-10 bg-red-900/10 text-red-500 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-red-900/20">Logout</button>
        </div>
    </div>

    <div id="saved-view" class="hidden p-4">
        <h2 class="text-xs font-black text-[#ff4500] uppercase mb-4 tracking-widest"><i class="fas fa-heart mr-2"></i>Saved Library</h2>
        <div id="saved-grid" class="space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-gray-900 flex justify-around p-4 z-50">
        <div onclick="window.location.href='index.html'" class="nav-item text-gray-600"><i class="fas fa-home text-xl"></i></div>
        <div id="nav-saved" onclick="switchTab('saved')" class="nav-item text-gray-600"><i class="fas fa-heart text-xl"></i></div>
        <div id="nav-profile" onclick="switchTab('profile')" class="nav-item text-gray-600"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDY93jrkGfIntFOA8_M3MCPoRVIuag_ppU", databaseURL: "https://build-realtime-database-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); const auth = firebase.auth();
        const player = new Plyr('#player');
        const params = new URLSearchParams(window.location.search);
        const vUrl = params.get('url'); const vTitle = params.get('title');
        const IMBB_KEY = "261aa84b498ef90b53306f69fd4f0b19";
        let vId = "", userData = null, activeTab = "play";

        auth.onAuthStateChanged(user => {
            if (user) { loadProfile(user.uid); findVideo(); checkSaveStatus(user.uid); loadSavedVideos(user.uid); listenMessages(user.uid); } 
            else { window.location.href = "login.html"; }
        });

        function toggleSupport() { const m = document.getElementById('support-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        async function sendText() { const i = document.getElementById('chatMsg'); const t = i.value.trim(); if(!t) return; pushMsg({ type: 'text', content: t, sender: 'user' }); i.value = ''; }
        async function pushMsg(m) { const uid = auth.currentUser.uid; m.timestamp = firebase.database.ServerValue.TIMESTAMP; const ref = db.ref(`support_chats/${uid}/messages`); const s = await ref.once('value'); await ref.push(m); db.ref(`support_chats/${uid}/meta`).update({ lastMsg: m.type === 'image' ? 'Sent a photo' : m.content, userName: userData.fullName, time: firebase.database.ServerValue.TIMESTAMP, unread: true }); if(!s.exists()) { setTimeout(() => { ref.push({ type: 'text', content: "এডমিন অনলাইনে আসলে আপনার এসএমএস এর রিপ্লাই দিবে। ধন্যবাদ!", sender: 'admin', timestamp: firebase.database.ServerValue.TIMESTAMP }); }, 1000); } }
        async function sendImage(i) { if(!i.files[0]) return; const fd = new FormData(); fd.append("image", i.files[0]); try { const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMBB_KEY}`, { method: "POST", body: fd }); const j = await r.json(); if(j.success) pushMsg({ type: 'image', content: j.data.url, sender: 'user' }); } catch (e) {} }
        function listenMessages(uid) { db.ref(`support_chats/${uid}/messages`).on('value', snap => { const box = document.getElementById('chat-box'); box.innerHTML = ''; snap.forEach(c => { const m = c.val(); const isU = m.sender === 'user'; box.innerHTML += `<div class="chat-bubble ${isU ? 'chat-user' : 'chat-admin'}">${m.type === 'image' ? `<img src="${m.content}" class="rounded-lg">` : m.content}</div>`; }); box.scrollTop = box.scrollHeight; }); }

        function handleBack() { activeTab === "play" ? window.location.href = 'index.html' : switchTab('play'); }
        async function uploadToImgBB(input) { const file = input.files[0]; if(!file) return; const fd = new FormData(); fd.append("image", file); try { const res = await fetch(`https://api.imgbb.com/1/upload?key=e2d86f7734279313838531102573663a`, { method: "POST", body: fd }); const data = await res.json(); if(data.success) db.ref('users/' + auth.currentUser.uid).update({ profilePic: data.data.url }); } catch(e) {} }

        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('p-name').innerText = userData.fullName || "User";
                document.getElementById('p-username').innerText = "@" + (userData.username || "user");
                if(userData.joinedDate) document.getElementById('p-joined').innerText = userData.joinedDate;
                else if(userData.timestamp) document.getElementById('p-joined').innerText = new Date(userData.timestamp).toLocaleDateString();
                else document.getElementById('p-joined').innerText = "22/04/2026";
                const acc = userData.accountType || "FREE";
                document.getElementById('p-acc-type').innerText = acc + " USER";
                if(acc === "PREMIUM" && userData.expiryTimestamp) { document.getElementById('expiry-box').classList.remove('hidden'); const d = Math.max(0, Math.ceil((userData.expiryTimestamp - Date.now()) / 86400000)); document.getElementById('p-expiry').innerText = d + " Days"; }
                if(userData.profilePic) { const img = `<img src="${userData.profilePic}" class="w-full h-full object-cover">`; document.getElementById('p-avatar-box').innerHTML = img; document.getElementById('top-user-icon').innerHTML = img; document.getElementById('p-comment-avatar').innerHTML = img; }
            });
        }

        function findVideo() { db.ref('videos').once('value', snap => { snap.forEach(child => { const d = child.val(); if(d.title === vTitle) { vId = child.key; document.getElementById('v-title').innerText = d.title; document.getElementById('v-views').innerText = d.views || 0; document.getElementById('v-likes').innerText = d.likes || 0; document.getElementById('v-dislikes').innerText = d.dislikes || 0; player.source = { type: 'video', sources: [{src: vUrl, type: 'video/mp4'}] }; checkVoteStatus(); loadRelated(d.category); loadComments(vId); db.ref(`videos/${vId}/views`).transaction(c => (c || 0) + 1); } }); }); }
        function handleVote(t) { const ref = db.ref(`votes/${vId}/${auth.currentUser.uid}`); ref.once('value', s => { const cur = s.val(); if(cur === t) { db.ref(`videos/${vId}/${t}`).transaction(c => Math.max(0, (c || 1) - 1)); ref.remove(); } else { if(cur) db.ref(`videos/${vId}/${cur}`).transaction(c => Math.max(0, (c || 1) - 1)); db.ref(`videos/${vId}/${t}`).transaction(c => (c || 0) + 1); ref.set(t); } }); }
        function checkVoteStatus() { db.ref(`votes/${vId}/${auth.currentUser.uid}`).on('value', s => { const t = s.val(); document.getElementById('likeBtn').classList.toggle('active', t === 'likes'); document.getElementById('dislikeBtn').classList.toggle('active', t === 'dislikes'); }); db.ref(`videos/${vId}`).on('value', s => { const d = s.val(); if(d) { document.getElementById('v-likes').innerText = d.likes || 0; document.getElementById('v-dislikes').innerText = d.dislikes || 0; } }); }
        function loadComments(vid) { db.ref('comments/' + vid).orderByChild('timestamp').on('value', snap => { const list = document.getElementById('comment-list'); const count = document.getElementById('v-comment-count'); list.innerHTML = ""; let cNum = 0; snap.forEach(child => { const c = child.val(); const isM = c.uid === auth.currentUser.uid; list.innerHTML += `<div class="flex gap-4 items-start"><div class="w-9 h-9 bg-gray-800 rounded-full flex-shrink-0 overflow-hidden flex items-center justify-center font-bold text-xs border border-gray-700">${c.userPic ? `<img src="${c.userPic}" class="w-full h-full object-cover">` : (c.userName ? c.userName[0] : 'U')}</div><div class="flex-1"><div class="flex justify-between items-center mb-1"><h4 class="text-[10px] font-black text-gray-500 uppercase">${c.userName}</h4>${isM ? `<div class="flex gap-4 text-[10px] text-gray-600"><i class="fas fa-edit" onclick="editComment('${child.key}', '${c.text}')"></i><i class="fas fa-trash" onclick="deleteComment('${child.key}')"></i></div>` : ''}</div><div class="comment-bubble"><p class="text-xs text-gray-200">${c.text}</p></div></div></div>`; cNum++; }); count.innerText = cNum; list.scrollTop = list.scrollHeight; }); }
        function postComment() { const i = document.getElementById('comment-input'); if(!i.value.trim() || !vId) return; db.ref('comments/' + vId).push({ uid: auth.currentUser.uid, userName: userData.fullName || "User", userPic: userData.profilePic || null, text: i.value.trim(), timestamp: firebase.database.ServerValue.TIMESTAMP }); i.value = ""; }
        function editComment(cid, o) { const n = prompt("Edit:", o); if(n && n !== o) db.ref(`comments/${vId}/${cid}`).update({ text: n }); }
        function deleteComment(cid) { if(confirm("Delete?")) db.ref(`comments/${vId}/${cid}`).remove(); }
        function reportVideo() { const r = prompt("Reason:"); if(r) { db.ref('reports').push({ videoId: vId, reportedBy: auth.currentUser.uid, reason: r, timestamp: Date.now() }).then(() => alert("Reported!")); } }
        function switchTab(t) { activeTab = t; ['play-view', 'profile-view', 'saved-view'].forEach(v => document.getElementById(v).classList.add('hidden')); document.getElementById(t + '-view').classList.remove('hidden'); document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-[#ff4500]', 'text-gray-600')); if(t !== 'play') { const target = (t === 'saved') ? 'nav-saved' : 'nav-profile'; document.getElementById(target).classList.replace('text-gray-600', 'text-[#ff4500]'); } }
        function toggleComments(s) { document.getElementById('comment-tab').classList.toggle('open', s); }
        function downloadVideo() { window.open(vUrl, '_blank'); }
        function shareVideo() { if(navigator.share) navigator.share({ title: vTitle, url: window.location.href }); }
        function checkSaveStatus(uid) { db.ref(`saved/${uid}`).on('value', snap => { const isS = snap.hasChild(vId); document.getElementById('saveBtn').classList.toggle('active', isS); document.getElementById('saveLabel').innerText = isS ? "SAVED" : "SAVE"; }); }
        async function toggleSave() { const ref = db.ref(`saved/${auth.currentUser.uid}/${vId}`); const s = await ref.once('value'); s.exists() ? ref.remove() : ref.set(true); }
        function loadSavedVideos(uid) { db.ref(`saved/${uid}`).on('value', snap => { const grid = document.getElementById('saved-grid'); grid.innerHTML = ""; snap.forEach(c => { db.ref('videos/' + c.key).once('value', vSnap => { const v = vSnap.val(); if(v) grid.innerHTML += `<div class="suggested-card flex gap-4 p-3 items-center" onclick="location.href='play.html?url=${encodeURIComponent(v.video_url)}&title=${encodeURIComponent(v.title)}'"><img src="${v.thumbnail}" class="w-24 h-14 object-cover rounded-xl border border-gray-800"><h3 class="text-[11px] font-bold line-clamp-2">${v.title}</h3></div>`; }); }); }); }
        function loadRelated(cat) { db.ref('videos').orderByChild('category').equalTo(cat).limitToLast(10).once('value', snap => { const grid = document.getElementById('related-grid'); grid.innerHTML = ""; snap.forEach(c => { const v = c.val(); if(v.title !== vTitle) { grid.innerHTML += `<div class="suggested-card flex gap-3 p-2 shadow-lg" onclick="location.href='play.html?url=${encodeURIComponent(v.video_url)}&title=${encodeURIComponent(v.title)}'"><div class="relative w-36 h-20 flex-shrink-0"><img src="${v.thumbnail}" class="w-full h-full object-cover rounded-xl border border-white/5"><span class="duration-tag">${v.duration || '00:00'}</span></div><div class="flex flex-col justify-center pr-2 overflow-hidden"><h3 class="text-[11px] font-bold leading-snug line-clamp-2 text-gray-100">${v.title}</h3><div class="flex items-center gap-2 mt-2"><span class="text-[8px] text-[#ff4500] font-black uppercase tracking-tighter">${v.views || 0} Views</span><span class="text-[8px] text-gray-600 font-black">•</span><span class="text-[8px] text-gray-500 font-bold uppercase">${v.category || 'Viral'}</span></div></div></div>`; } }); }); }
    </script>
    <script src="https://unsettledradiator.com/bb/af/62/bbaf623bd005ed758480b20d81e44d2c.js"></script>
    
</body>
</html>
