<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUBX VIRAL 2.0 - Playing</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type='text/javascript' src='//unsettledradiator.com/26/62/17/2662176d655f4640161427670732439c.js'></script>
    <style>
        :root { --plyr-color-main: #ff4500; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding-bottom: 90px; }
        ::-webkit-scrollbar { display: none; }
        .tube-header { background: #000; border-bottom: 2px solid #ff4500; }
        .action-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: #666; cursor: pointer; transition: 0.2s; font-weight: bold; text-transform: uppercase; }
        .action-btn.active { color: #ff4500; scale: 1.1; }
        .profile-container { background: #111; border: 1px solid #222; border-radius: 30px; padding: 25px 15px; }
        .ref-box { background: #000; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .info-row { background: #000; border: 1px solid #222; border-radius: 15px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .expiry-box-style { background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 15px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        #comment-tab { position: fixed; bottom: 0; left: 0; right: 0; height: 75%; background: #0f0f0f; border-top: 2px solid #ff4500; z-index: 1000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 25px 25px 0 0; display: flex; flex-direction: column; }
        #comment-tab.open { transform: translateY(0); }
        #support-modal { background: rgba(0,0,0,0.98); z-index: 9999; position: fixed; inset: 0; display: none; flex-direction: column; }
        .floating-support { position: fixed; bottom: 100px; right: 20px; background: linear-gradient(135deg, #ff4500, #ff8c00); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; z-index: 999; animation: bounce 2s infinite; border: 2px solid rgba(255,255,255,0.2); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 13px; margin-bottom: 5px; }
        .chat-user { background: #ff4500; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-admin { background: #222; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        #pre-roll-ad { position: absolute; inset: 0; background: black; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .ad-timer { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 20px; font-size: 10px; border: 1px solid #ff4500; color: white; z-index: 110; }
        #skip-btn { position: absolute; bottom: 50px; right: 0; background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-left: 4px solid #ff4500; display: none; cursor: pointer; font-weight: bold; font-size: 12px; z-index: 110; }
        .duration-tag { background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 8px; bottom: 5px; right: 5px; position: absolute; }
    </style>
</head>
<body>
    <div onclick="toggleSupport()" class="floating-support"><i class="fas fa-comments"></i></div>
    <div id="support-modal">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black">
            <div class="flex items-center gap-2"><div class="w-8 h-8 bg-[#ff4500] rounded-full flex items-center justify-center text-[10px] font-bold">AD</div><div><h3 class="text-sm font-bold">HubX Support</h3><p class="text-[10px] text-green-500">Always Online</p></div></div>
            <button onclick="toggleSupport()" class="text-gray-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-2"></div>
        <div class="p-4 bg-[#111] border-t border-gray-800">
            <div class="flex gap-2 items-center bg-black p-2 rounded-2xl border border-gray-800">
                <input type="text" id="chatMsg" placeholder="Type a message..." class="flex-1 bg-transparent text-sm outline-none px-2 text-white">
                <button onclick="sendSupportMsg()" class="bg-[#ff4500] w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <header class="tube-header p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3"><i class="fas fa-arrow-left text-gray-400 cursor-pointer" onclick="handleBack()"></i><h1 class="text-xl font-black italic tracking-tighter uppercase text-[#ff4500]">HUBX <span class="text-white">VIRAL 2.0</span></h1></div>
        <div id="top-user-icon" class="w-8 h-8 bg-[#ff4500] rounded-full border-2 border-white/10 flex items-center justify-center text-xs font-bold overflow-hidden">U</div>
    </header>

    <div id="play-view">
        <div class="bg-black aspect-video relative">
            <div id="pre-roll-ad">
                <div class="ad-timer" id="ad-timer-text">Wait: 10s</div>
                <div class="ad-content">
                    <script>atOptions={'key':'4e1a56763ab45e4295c4a7c54f18f24c','format':'iframe','height':250,'width':300,'params':{}};</script>
                    <script src="https://unsettledradiator.com/4e1a56763ab45e4295c4a7c54f18f24c/invoke.js"></script>
                </div>
                <div id="skip-btn" onclick="skipAd()">SKIP AD <i class="fas fa-forward ml-1"></i></div>
            </div>
            <video id="player" playsinline controls crossorigin></video>
        </div>

        <div class="p-4 text-center">
            <h1 id="v-title" class="text-lg font-bold text-gray-100 mb-1">Loading...</h1>
            <div class="flex justify-center items-center gap-3 text-[10px] text-gray-500 font-black uppercase">
                <span><i class="fas fa-eye text-[#ff4500] mr-1"></i> <span id="v-views">0</span> VIEWS</span>
            </div>

            <div class="flex justify-around mt-6 py-4 border-y border-gray-900">
                <div class="action-btn" id="likeBtn" onclick="handleVote('likes')"><i class="fas fa-thumbs-up text-lg"></i> <span id="v-likes">0</span></div>
                <div class="action-btn" id="dislikeBtn" onclick="handleVote('dislikes')"><i class="fas fa-thumbs-down text-lg"></i> <span id="v-dislikes">0</span></div>
                <div class="action-btn" onclick="downloadVideo()"><i class="fas fa-download text-lg text-blue-500"></i> <span>GET</span></div>
                <div class="action-btn" onclick="toggleComments(true)"><i class="fas fa-comment-dots text-lg text-yellow-500"></i> <span id="v-comment-count">0</span></div>
                <div class="action-btn" onclick="shareVideo()"><i class="fas fa-share-nodes text-lg text-green-500"></i> <span>SHARE</span></div>
            </div>

            <div class="mt-4 p-2 bg-[#111] rounded-xl overflow-hidden border border-gray-900">
                <script async="async" data-cfasync="false" src="//unsettledradiator.com/d00583cb02481efc137f3bd306146fa4/invoke.js"></script>
                <div id="container-d00583cb02481efc137f3bd306146fa4"></div>
            </div>
        </div>

        <div class="p-4">
            <h3 class="text-[10px] font-black uppercase text-gray-500 mb-4 tracking-widest px-1">Up Next / Related</h3>
            <div id="related-grid" class="space-y-4"></div>
        </div>
    </div>
        <div id="comment-tab">
        <div class="p-4 border-b border-gray-900 flex justify-between items-center"><h3 class="font-black uppercase text-xs tracking-widest text-[#ff4500]">Comments</h3><button onclick="toggleComments(false)" class="text-gray-500"><i class="fas fa-times text-xl"></i></button></div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 bg-[#111] border-t border-gray-900"><div class="flex gap-2 bg-black p-2 rounded-xl border border-gray-800"><input type="text" id="comment-input" placeholder="Add a comment..." class="flex-1 bg-transparent text-sm outline-none px-2 text-white"><button onclick="sendComment()" class="bg-[#ff4500] px-4 py-2 rounded-lg text-xs font-bold uppercase">SEND</button></div></div>
    </div>

    <div id="profile-view" class="hidden p-6">
        <div class="profile-container text-center relative">
            <div class="relative w-28 h-28 mx-auto mb-4"><div id="p-avatar-box" class="w-full h-full bg-[#ff4500] rounded-full flex items-center justify-center text-4xl font-black border-4 border-black overflow-hidden">U</div></div>
            <h2 class="text-xl font-black mb-1" id="p-name">User Name</h2><p class="text-gray-600 text-[10px] mb-6 font-bold" id="p-username">@username</p>
            <div class="ref-box">
                <div class="flex justify-between items-center mb-3"><span class="text-[9px] font-black text-[#ff4500] uppercase tracking-tighter">Invite & Get 3 Days</span><span class="text-[9px] bg-green-900/30 text-green-500 px-2 py-1 rounded-md font-bold">Total Ref: <span id="p-ref-count">0</span></span></div>
                <div class="flex gap-2"><input type="text" id="ref-link" readonly class="flex-1 bg-black border border-gray-800 rounded-lg px-3 py-2 text-[10px] text-gray-400 outline-none"><button onclick="copyRef()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Copy</button></div>
            </div>
            <div class="space-y-1">
                <div class="info-row"><span class="text-gray-500 text-[10px] font-bold uppercase">Status</span><span id="p-acc-type" class="text-[#ff4500] text-xs font-black">FREE USER</span></div>
                <div class="info-row"><span class="text-gray-500 text-[10px] font-bold uppercase">Joined Date</span><span id="p-joined" class="text-gray-400 text-[10px] font-bold italic">--/--/----</span></div>
                <div id="expiry-box" class="hidden expiry-box-style"><span class="text-yellow-500 text-[10px] font-bold uppercase">Ends In</span><span id="p-expiry-countdown" class="text-yellow-500 text-xs font-black">--</span></div>
            </div>
            <button onclick="auth.signOut()" class="w-full mt-8 bg-red-900/10 text-red-500 py-4 rounded-2xl font-black uppercase text-[10px] border border-red-900/20">Logout Account</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-gray-900 flex justify-around p-4 z-50">
        <div onclick="window.location.href='index.html'" class="text-gray-600"><i class="fas fa-home text-xl"></i></div>
        <div id="nav-play" onclick="switchTab('play')" class="text-[#ff4500]"><i class="fas fa-play-circle text-xl"></i></div>
        <div id="nav-profile" onclick="switchTab('profile')" class="text-gray-600"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>
        <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDY93jrkGfIntFOA8_M3MCPoRVIuag_ppU", databaseURL: "https://build-realtime-database-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); const auth = firebase.auth();
        const player = new Plyr('#player');
        const params = new URLSearchParams(window.location.search);
        const vUrl = params.get('url'), vTitle = params.get('title');
        let vId = "", userData = null, activeTab = "play", adCompleted = false;

        auth.onAuthStateChanged(user => { if (user) { loadProfile(user.uid); findVideo(); listenSupportMsgs(); } else { window.location.href = "login.html"; } });

        function toggleSupport() { const m = document.getElementById('support-modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        async function sendSupportMsg() { const input = document.getElementById('chatMsg'); const text = input.value.trim(); if(!text || !auth.currentUser) return; await db.ref(`support_chats/${auth.currentUser.uid}/messages`).push({ sender: 'user', content: text, timestamp: Date.now() }); db.ref(`support_chats/${auth.currentUser.uid}/meta`).update({ lastMsg: text, userName: userData.fullName, time: Date.now(), unread: true }); input.value = ""; }
        function listenSupportMsgs() { if(!auth.currentUser) return; db.ref(`support_chats/${auth.currentUser.uid}/messages`).on('value', snap => { const box = document.getElementById('chat-box'); box.innerHTML = ""; snap.forEach(c => { const m = c.val(); box.innerHTML += `<div class="chat-bubble ${m.sender === 'user' ? 'chat-user' : 'chat-admin'}">${m.content || m.text}</div>`; }); box.scrollTop = box.scrollHeight; }); }

        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('p-name').innerText = userData.fullName || "User";
                document.getElementById('p-username').innerText = "@" + (userData.username || "user");
                
                // --- UPDATED REFERRAL LINK WITH /app ---
                document.getElementById('ref-link').value = `${window.location.origin}/app/signup.html?ref=${uid}`;
                
                document.getElementById('p-ref-count').innerText = userData.referralCount || 0;
                document.getElementById('p-joined').innerText = userData.joinedDate || (userData.timestamp ? new Date(userData.timestamp).toLocaleDateString('en-GB') : "25/04/2026");
                const accType = userData.accountType || "FREE";
                document.getElementById('p-acc-type').innerText = accType + " USER";
                const exBox = document.getElementById('expiry-box');
                if(accType === "PREMIUM" && userData.expiryTimestamp) {
                    exBox.classList.remove('hidden');
                    const diff = userData.expiryTimestamp - Date.now();
                    document.getElementById('p-expiry-countdown').innerText = diff > 0 ? Math.ceil(diff / (1000 * 60 * 60 * 24)) + " Days" : "Expired";
                } else { exBox.classList.add('hidden'); }
                if(userData.profilePic) { const img = `<img src="${userData.profilePic}" class="w-full h-full object-cover">`; document.getElementById('p-avatar-box').innerHTML = img; document.getElementById('top-user-icon').innerHTML = img; }
            });
        }

        async function handleVote(type) { if (!vId) return; const voteRef = db.ref(`video_votes/${vId}/${auth.currentUser.uid}`); const snap = await voteRef.once('value'); const ex = snap.val(); if (ex === type) { await voteRef.remove(); db.ref(`videos/${vId}/${type}`).transaction(c => (c || 1) - 1); } else { if(ex) db.ref(`videos/${vId}/${ex}`).transaction(c => (c || 1) - 1); await voteRef.set(type); db.ref(`videos/${vId}/${type}`).transaction(c => (c || 0) + 1); } }
        function listenVotes() { db.ref(`videos/${vId}`).on('value', snap => { const d = snap.val(); if(!d) return; document.getElementById('v-likes').innerText = d.likes || 0; document.getElementById('v-dislikes').innerText = d.dislikes || 0; }); db.ref(`video_votes/${vId}/${auth.currentUser.uid}`).on('value', snap => { const v = snap.val(); document.getElementById('likeBtn').classList.toggle('active', v === 'likes'); document.getElementById('dislikeBtn').classList.toggle('active', v === 'dislikes'); }); }
        function toggleComments(s) { document.getElementById('comment-tab').classList.toggle('open', s); if(s) loadComments(); }
        function sendComment() { const val = document.getElementById('comment-input').value.trim(); if (!val || !vId) return; db.ref(`comments/${vId}`).push({ uid: auth.currentUser.uid, name: userData.fullName, photo: userData.profilePic || '', text: val, timestamp: Date.now() }); document.getElementById('comment-input').value = ""; }
        function loadComments() { db.ref(`comments/${vId}`).on('value', snap => { const list = document.getElementById('comment-list'); list.innerHTML = ""; snap.forEach(child => { const c = child.val(); list.innerHTML += `<div class="comment-item flex gap-3"><img src="${c.photo || 'https://via.placeholder.com/40'}" class="w-8 h-8 rounded-full bg-gray-800"><div class="flex-1"><span class="text-[10px] font-bold text-gray-500">${c.name}</span><p class="text-sm mt-1">${c.text}</p></div></div>`; }); document.getElementById('v-comment-count').innerText = snap.numChildren(); }); }

        function findVideo() { db.ref('videos').once('value', snap => { snap.forEach(child => { const d = child.val(); if(d.title === vTitle) { vId = child.key; document.getElementById('v-title').innerText = d.title; document.getElementById('v-views').innerText = d.views || 0; player.source = { type: 'video', sources: [{src: vUrl, type: 'video/mp4'}] }; listenVotes(); loadRelated(d.category); db.ref(`videos/${vId}/views`).transaction(c => (c || 0) + 1); } }); }); }
        function skipAd() { document.getElementById('pre-roll-ad').style.display = 'none'; adCompleted = true; player.play(); }
        function loadRelated(cat) { db.ref('videos').orderByChild('category').equalTo(cat).limitToLast(10).once('value', snap => { const grid = document.getElementById('related-grid'); grid.innerHTML = ""; snap.forEach(c => { const v = c.val(); if(v.title !== vTitle) grid.innerHTML += `<div class="flex gap-3 p-2" onclick="location.href='play.html?url=${encodeURIComponent(v.video_url)}&title=${encodeURIComponent(v.title)}'"><div class="relative w-32 h-18 flex-shrink-0"><img src="${v.thumbnail}" class="w-full h-full object-cover rounded-xl border border-white/5"><span class="duration-tag">${v.duration || '00:00'}</span></div><div class="flex flex-col justify-center overflow-hidden"><h3 class="text-[11px] font-bold line-clamp-2">${v.title}</h3><span class="text-[8px] text-[#ff4500] uppercase mt-1">${v.views || 0} Views</span></div></div>`; }); }); }
        function switchTab(t) { activeTab = t; ['play-view', 'profile-view'].forEach(v => document.getElementById(v).classList.add('hidden')); document.getElementById(t + '-view').classList.remove('hidden'); document.querySelectorAll('nav div').forEach(el => el.classList.replace('text-[#ff4500]', 'text-gray-600')); document.getElementById('nav-' + (t==='play'?'play':'profile')).classList.replace('text-gray-600', 'text-[#ff4500]'); }
        function handleBack() { activeTab === "play" ? window.location.href = 'index.html' : switchTab('play'); }
        player.on('play', () => { if (!adCompleted) { player.pause(); document.getElementById('pre-roll-ad').style.display='flex'; let tl=10; const ti=setInterval(()=>{tl--;document.getElementById('ad-timer-text').innerText=`Wait: ${tl}s`;if(tl<=0){clearInterval(ti);document.getElementById('skip-btn').style.display='block';}},1000); } });
    </script>
</body>
</html>
