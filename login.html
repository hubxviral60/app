<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubX Viral 2.0 - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .login-card { background: #111; padding: 2rem; border-radius: 24px; border: 1px solid #333; width: 100%; max-width: 380px; transition: 0.5s; }
        input { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; transition: 0.3s; }
        input:focus { border-color: #ff4500 !important; outline: none; }
        .primary-btn { background: #ff4500; font-weight: 900; transition: 0.3s; }
        .primary-btn:active { transform: scale(0.95); }
        
        #success-overlay { position: fixed; inset: 0; background: #0a0a0a; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200000; }
        .loader-ring { width: 80px; height: 80px; border: 4px solid #1a1a1a; border-top: 4px solid #ff4500; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #age-gate-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 100000; padding: 20px; }
    </style>
</head>
<body>
    <div id="success-overlay">
        <div class="loader-ring mb-4"></div>
        <h2 class="text-xl font-black italic text-[#ff4500] animate-pulse">ACCESSING HUBX VIRAL...</h2>
    </div>

    <div id="age-gate-overlay">
        <div class="age-card bg-[#111] border border-[#ff4500]/30 rounded-[28px] p-8 max-w-[340px] text-center">
            <div class="w-16 h-16 bg-[#ff4500]/10 rounded-full flex items-center justify-center mx-auto mb-5 border border-[#ff4500]/30">
                <i class="fas fa-exclamation-triangle text-2xl text-[#ff4500]"></i>
            </div>
            <h2 class="text-xl font-black text-white uppercase italic mb-3">Adult Content (18+)</h2>
            <p class="text-gray-400 text-[11px] font-bold mb-8 leading-relaxed">এই অ্যাপটি প্রাপ্তবয়স্কদের জন্য। প্রবেশ করতে আপনার বয়স অবশ্যই ১৮+ হতে হবে।</p>
            <button onclick="acceptAge()" class="w-full bg-[#ff4500] py-4 rounded-xl font-black uppercase text-xs mb-3">হ্যাঁ, আমার বয়স ১৮+</button>
            <a href="https://www.google.com" class="block text-gray-600 text-[10px] font-bold uppercase tracking-widest">না, বের হয়ে যাব</a>
        </div>
    </div>

    <div id="recovery-modal" class="fixed inset-0 flex items-center justify-center p-6 hidden bg-black/90 z-[9999]">
        <div class="bg-[#1a1a1a] p-6 rounded-2xl border border-gray-800 w-full max-w-sm">
            <h2 class="text-lg font-bold mb-2">পাসওয়ার্ড রিকভারি</h2>
            <input type="email" id="recovery-email" placeholder="email@example.com" class="w-full p-4 rounded-xl outline-none text-sm mb-4">
            <button onclick="sendResetLink()" id="resetBtn" class="w-full bg-white text-black py-3 rounded-xl font-bold uppercase text-xs">Send Link</button>
            <button onclick="document.getElementById('recovery-modal').classList.add('hidden')" class="w-full mt-3 text-gray-500 text-[10px] uppercase font-bold">Cancel</button>
        </div>
    </div>

    <div class="login-card" id="main-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic text-[#ff4500] uppercase tracking-tighter">HUBX <span class="text-white">VIRAL 2.0</span></h1>
            <p class="text-gray-500 text-[10px] mt-1 uppercase font-bold tracking-widest">Sign in to continue</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="example@mail.com" class="w-full p-4 rounded-xl outline-none text-sm">
            <input type="password" id="password" placeholder="••••••••" class="w-full p-4 rounded-xl outline-none text-sm">
            <div class="text-right">
                <button onclick="document.getElementById('recovery-modal').classList.remove('hidden')" class="text-[10px] font-bold text-[#ff4500] uppercase">Forgot Password?</button>
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full primary-btn py-4 rounded-xl font-black uppercase text-sm shadow-lg shadow-[#ff4500]/20">Log In</button>
            <div class="text-center mt-6">
                <p class="text-gray-500 text-xs">Don't have an account? <a href="javascript:void(0)" onclick="goToSignup()" class="text-[#ff4500] font-bold">Register Now</a></p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDY93jrkGfIntFOA8_M3MCPoRVIuag_ppU",
            databaseURL: "https://build-realtime-database-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');

        function goToSignup() {
            // সংশোধিত: বাড়তি /app/ বাদ দেওয়া হয়েছে
            const path = refId ? `signup.html?ref=${refId}` : "signup.html";
            window.location.href = path;
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const card = document.getElementById('main-card');
            const overlay = document.getElementById('success-overlay');
            
            if(!email || !pass) return alert("ইমেইল এবং পাসওয়ার্ড দিন!");
            
            btn.disabled = true;
            btn.innerText = "Authenticating...";

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                
                card.style.opacity = "0";
                card.style.transform = "scale(0.9)";
                
                setTimeout(() => {
                    overlay.style.display = "flex";
                    setTimeout(() => {
                        // সংশোধিত: বাড়তি /app/ বাদ দেওয়া হয়েছে যাতে current directory থেকে ফাইল নেয়
                        window.location.replace("index.html");
                    }, 1500);
                }, 400);

            } catch (error) {
                alert("ভুল ইমেইল অথবা পাসওয়ার্ড!");
                btn.disabled = false;
                btn.innerText = "Log In";
            }
        }

        window.onload = function() {
            if(!sessionStorage.getItem('ageVerified')) {
                document.getElementById('age-gate-overlay').style.display = 'flex';
            }
        };

        function acceptAge() {
            sessionStorage.setItem('ageVerified', 'true');
            document.getElementById('age-gate-overlay').style.display = 'none';
        }

        async function sendResetLink() {
            const email = document.getElementById('recovery-email').value.trim();
            if(!email) return alert("ইমেইল দিন!");
            try {
                await auth.sendPasswordResetEmail(email);
                alert("রিসেট লিঙ্ক পাঠানো হয়েছে!");
                document.getElementById('recovery-modal').classList.add('hidden');
            } catch (e) { alert(e.message); }
        }
    </script>
</body>
</html>
