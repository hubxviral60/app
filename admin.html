<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubX Admin - Manage Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .tab-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .tab-btn-member.active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        #admin-login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 8px; padding: 2px 5px; border-radius: 50%; font-weight: bold; border: 1px solid #111827; }
        .tab-btn { position: relative; }
    </style>
</head>
<body class="bg-gray-950 text-white p-4 min-h-screen font-sans">
    <div id="admin-login-overlay">
        <div class="bg-gray-900 p-8 rounded-3xl border border-blue-500/30 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-2xl font-black text-blue-500 mb-6 uppercase italic">HUBX <span class="text-white">ADMIN</span></h2>
            <input id="admin-gate-pass" type="password" placeholder="Enter Admin Password" class="w-full p-4 bg-gray-800 rounded-xl outline-none border border-gray-700 focus:border-blue-500 transition text-center mb-4">
            <button onclick="checkAdminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black uppercase tracking-widest transition shadow-lg">Login Now</button>
        </div>
    </div>
    <div class="max-w-2xl mx-auto mt-6">
        <div class="bg-gray-900 p-5 rounded-3xl border border-yellow-500/30 mb-6 flex justify-between items-center shadow-2xl">
            <div>
                <h3 class="text-gray-500 text-[10px] uppercase font-black tracking-widest">App Maintenance</h3>
                <p id="m-status-text" class="text-xs font-bold text-green-500 mt-1 uppercase">● App is Live</p>
            </div>
            <button id="m-toggle-btn" onclick="toggleMaintenance()" class="bg-yellow-600 hover:bg-yellow-700 px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all shadow-lg">Turn On</button>
        </div>
        <div class="bg-gray-900 p-6 rounded-3xl border border-blue-500/30 mb-8 flex justify-between items-center shadow-2xl">
            <div>
                <h3 class="text-gray-500 text-xs uppercase font-black tracking-widest">Total Community</h3>
                <p class="text-3xl font-black text-blue-500 mt-1" id="total-users">0</p>
            </div>
            <div class="bg-blue-500/10 p-4 rounded-2xl"><i class="fas fa-users text-3xl text-blue-500"></i></div>
        </div>
        
        <div class="flex gap-1 mb-8 bg-gray-900 p-1.5 rounded-2xl border border-gray-800 overflow-x-auto custom-scroll">
            <button onclick="switchTab('upload')" id="tab-upload" class="tab-btn active flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition uppercase tracking-tighter"><i class="fas fa-plus-circle mr-1"></i> Upload</button>
            <button onclick="switchTab('manage')" id="tab-manage" class="tab-btn flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition text-gray-500 uppercase tracking-tighter"><i class="fas fa-tasks mr-1"></i> Library</button>
            <button onclick="switchTab('support')" id="tab-support" class="tab-btn flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition text-gray-500 uppercase tracking-tighter"><i class="fas fa-comment-dots mr-1"></i> Support <span id="badge-support" class="badge hidden">0</span></button>
            <button onclick="switchTab('members')" id="tab-members" class="tab-btn flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition text-gray-500 uppercase tracking-tighter"><i class="fas fa-user-shield mr-1"></i> Members <span id="badge-members" class="badge hidden">0</span></button>
            <button onclick="switchTab('payments')" id="tab-payments" class="tab-btn flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition text-gray-500 uppercase tracking-tighter"><i class="fas fa-wallet mr-1"></i> Payments <span id="badge-payments" class="badge hidden">0</span></button>
            <button onclick="switchTab('reports')" id="tab-reports" class="tab-btn flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition text-gray-500 uppercase tracking-tighter"><i class="fas fa-flag mr-1"></i> Reports <span id="badge-reports" class="badge hidden">0</span></button>
            <button onclick="switchTab('notice')" id="tab-notice" class="tab-btn flex-none px-4 py-3 rounded-xl font-bold text-[9px] transition text-gray-500 uppercase tracking-tighter"><i class="fas fa-bullhorn mr-1"></i> Notice</button>
        </div>
                <div id="upload-section" class="bg-gray-900 p-6 rounded-3xl shadow-2xl border border-gray-800">
            <h2 id="formTitle" class="text-xl font-black mb-6 text-blue-500 uppercase tracking-widest text-center">Upload Video</h2>
            <div class="space-y-4">
                <input id="pass" type="hidden" value="1234"> 
                <input id="t" type="text" placeholder="Video Title" class="w-full p-4 bg-gray-800 rounded-xl outline-none border border-gray-700 focus:border-blue-500 transition">
                <div class="grid grid-cols-2 gap-4">
                    <input id="dur" type="text" placeholder="Duration (Ex: 10:20)" class="w-full p-4 bg-gray-800 rounded-xl outline-none border border-gray-700 focus:border-blue-500 transition text-sm">
                    <select id="cat" class="bg-gray-800 p-4 rounded-xl border border-gray-700 outline-none text-sm text-gray-400 font-black">
                        <option value="ALL">ALL CATEGORY</option>
                        <option value="DESHI">DESHI</option>
                        <option value="ENGLISH">ENGLISH</option>
                        <option value="VIRAL">VIRAL</option>
                        <option value="HOT">HOT</option>
                    </select>
                </div>
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between items-center">
                    <span class="text-sm font-bold text-gray-400">Video Type:</span>
                    <select id="videoType" class="bg-gray-900 text-sm font-bold text-blue-500 outline-none">
                        <option value="Free">FREE</option>
                        <option value="Premium">PREMIUM (Paid)</option>
                    </select>
                </div>
                <input id="imageFile" type="file" accept="image/*" class="hidden">
                <div onclick="document.getElementById('imageFile').click()" class="cursor-pointer bg-gray-800 p-5 rounded-xl border border-dashed border-blue-500 text-center hover:bg-gray-700 transition">
                    <p id="fileName" class="text-xs text-blue-400 font-bold uppercase tracking-tighter">📸 Select Thumbnail</p>
                </div>
                <input id="v" type="text" placeholder="Video Direct Link" class="w-full p-4 bg-gray-800 rounded-xl outline-none border border-gray-700 focus:border-blue-500 transition">
                <input type="hidden" id="editId"> 
                <button id="uploadBtn" onclick="processUpload()" class="w-full bg-blue-600 hover:bg-blue-700 p-5 rounded-xl font-black text-white shadow-xl transition uppercase tracking-widest mt-2">Publish Video</button>
                <button id="cancelBtn" onclick="resetForm()" class="w-full bg-gray-700 p-4 rounded-xl font-bold hidden mt-2">Cancel Edit</button>
                <p id="status" class="mt-4 text-center text-xs text-yellow-500 font-bold hidden animate-pulse">Processing... please wait!</p>
            </div>
        </div>

        <div id="support-section" class="hidden bg-gray-900 p-6 rounded-3xl border border-gray-800">
            <div id="s-list-view">
                <h2 class="text-xl font-black text-blue-500 uppercase mb-6 text-center tracking-widest">Support Inbox</h2>
                <div id="supportUserList" class="space-y-3 max-h-[60vh] overflow-y-auto custom-scroll"></div>
            </div>
            <div id="s-chat-view" class="hidden flex flex-col h-[70vh]">
                <div class="flex items-center gap-3 pb-3 border-b border-gray-800 mb-4">
                    <button onclick="closeChat()" class="text-gray-400"><i class="fas fa-arrow-left"></i></button>
                    <h4 id="active-user-name" class="text-sm font-black text-blue-500 uppercase italic">User Name</h4>
                </div>
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scroll flex flex-col"></div>
                <div class="mt-4 flex gap-2 bg-gray-800 p-2 rounded-2xl border border-gray-700">
                    <button onclick="document.getElementById('cImg').click()" class="text-gray-400 px-2"><i class="fas fa-image"></i></button>
                    <input type="file" id="cImg" class="hidden" accept="image/*" onchange="sendImage(this)">
                    <input type="text" id="cInp" placeholder="Type message..." class="flex-1 bg-transparent text-sm outline-none">
                    <button onclick="sendText()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane text-xs"></i></button>
                </div>
            </div>
        </div>

        <div id="manage-section" class="hidden bg-gray-900 p-6 rounded-3xl border border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-green-500 uppercase tracking-widest">Video Library</h2>
                <span id="video-count" class="bg-gray-800 px-3 py-1 rounded-full text-[10px] font-bold text-gray-400 border border-gray-700">0 Videos</span>
            </div>
            <div id="videoList" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2 custom-scroll flex flex-col-reverse"></div>
        </div>

        <div id="members-section" class="hidden bg-gray-900 p-6 rounded-3xl border border-gray-800">
            <div class="flex border-b border-gray-800 mb-6">
                <button onclick="switchMemberTab('premium')" id="m-tab-premium" class="tab-btn-member active flex-1 py-3 text-[10px] font-black uppercase">Premium</button>
                <button onclick="switchMemberTab('free')" id="m-tab-free" class="tab-btn-member flex-1 py-3 text-[10px] font-black uppercase text-gray-500">Free</button>
            </div>
            <div id="memberList" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
        </div>
           <div id="payments-section" class="hidden bg-gray-900 p-6 rounded-3xl border border-gray-800">
            <h2 class="text-xl font-black text-yellow-500 uppercase tracking-widest mb-6 text-center">Payment Requests</h2>
            <div id="paymentList" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2 custom-scroll"></div>
        </div>
<div id="reports-section" class="hidden bg-gray-900 p-6 rounded-3xl border border-gray-800">
            <h2 class="text-xl font-black text-red-500 uppercase tracking-widest mb-6 text-center">Video Reports</h2>
            <div id="reportList" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2 custom-scroll"></div>
        </div>

        <div id="notice-section" class="hidden bg-gray-900 p-6 rounded-3xl border border-gray-800">
            <h2 class="text-xl font-black text-blue-500 uppercase tracking-widest mb-6 text-center">Push Notice</h2>
            <div class="space-y-4">
                <textarea id="notice-msg" placeholder="Write notice..." class="w-full h-32 p-4 bg-gray-800 rounded-xl outline-none border border-gray-700 text-sm"></textarea>
                <div class="flex gap-2">
                    <button onclick="publishNotice()" class="flex-1 bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest text-[10px]">Publish Notice</button>
                    <button onclick="clearNotice()" class="bg-red-600/10 text-red-500 px-6 rounded-xl border border-red-600/20 font-black uppercase tracking-widest text-[10px]">Clear</button>
                </div>
                <p id="notice-status" class="text-center text-[10px] text-green-500 font-bold hidden">Notice Updated!</p>
            </div>
        </div>
    </div>
        <script>
        const firebaseConfig = { apiKey: "AIzaSyDY93jrkGfIntFOA8_M3MCPoRVIuag_ppU", databaseURL: "https://build-realtime-database-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = "261aa84b498ef90b53306f69fd4f0b19";
        let curUid = null;

        function checkAdminLogin() { if(document.getElementById('admin-gate-pass').value === "25909831") document.getElementById('admin-login-overlay').style.display = 'none'; else alert("ভুল পাসওয়ার্ড!"); }
        
        function switchTab(tab) {
            const sections = ['upload-section', 'manage-section', 'members-section', 'payments-section', 'reports-section', 'notice-section', 'support-section'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('active', 'text-white'); btn.classList.add('text-gray-500'); });
            document.getElementById(tab + '-section').classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active', 'text-white');
            const badge = document.getElementById('badge-' + tab); if(badge) badge.classList.add('hidden');
            if(tab === 'manage') fetchVideos();
            if(tab === 'members') switchMemberTab('premium');
            if(tab === 'payments') fetchPayments();
            if(tab === 'reports') fetchReports();
        }

        async function processUpload() {
            const title = document.getElementById('t').value, duration = document.getElementById('dur').value, category = document.getElementById('cat').value, vType = document.getElementById('videoType').value, videoUrl = document.getElementById('v').value, imageFile = document.getElementById('imageFile').files[0], editId = document.getElementById('editId').value, status = document.getElementById('status');
            if(!title || !videoUrl) { alert("সব তথ্য দিন!"); return; }
            status.classList.remove('hidden'); document.getElementById('uploadBtn').disabled = true;
            let thumbnailUrl = "";
            try {
                if(imageFile) { const formData = new FormData(); formData.append("image", imageFile); const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData }); const result = await response.json(); thumbnailUrl = result.data.url; }
                const videoData = { title, duration: duration || "00:00", category, type: vType, video_url: videoUrl, uploadDate: Date.now() };
                if(thumbnailUrl) videoData.thumbnail = thumbnailUrl;
                if(editId) { await db.ref('videos/' + editId).update(videoData); alert("আপডেট হয়েছে!"); switchTab('manage'); }
                else { if(!thumbnailUrl) { alert("ইমেজ দিন!"); return; } await db.ref('videos').push(videoData); alert("পাবলিশ হয়েছে!"); }
                resetForm();
            } catch (error) { alert("ব্যর্থ হয়েছে!"); }
            finally { status.classList.add('hidden'); document.getElementById('uploadBtn').disabled = false; }
        }

        function fetchVideos() {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('videoList'); list.innerHTML = ""; let count = 0;
                snap.forEach(child => {
                    count++; const d = child.val(), id = child.key;
                    const typeBadge = d.type === 'Premium' ? '<span class="text-[8px] bg-yellow-600 px-1 rounded text-white">PRO</span>' : '';
                    list.innerHTML += `<div class="bg-gray-800 p-3 rounded-2xl flex items-center gap-4 border border-gray-700">
                        <img src="${d.thumbnail}" class="w-16 h-10 rounded object-cover">
                        <div class="flex-1 min-w-0"><h4 class="text-xs font-bold truncate">${typeBadge} ${d.title}</h4></div>
                        <div class="flex gap-1"><button onclick="editVideo('${id}', '${d.title}', '${d.duration}', '${d.category}', '${d.video_url}', '${d.type}')" class="text-blue-500 p-2"><i class="fas fa-edit"></i></button><button onclick="deleteVideo('${id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button></div></div>`;
                });
                document.getElementById('video-count').innerText = count + " Videos";
            });
        }

        db.ref('payment_requests').on('value', snap => {
            const b = document.getElementById('badge-payments');
            if(snap.exists() && snap.numChildren() > 0) { b.innerText = snap.numChildren(); b.classList.remove('hidden'); }
            else b.classList.add('hidden');
        });
        db.ref('reports').on('value', snap => {
            const b = document.getElementById('badge-reports');
            if(snap.exists() && snap.numChildren() > 0) { b.innerText = snap.numChildren(); b.classList.remove('hidden'); }
            else b.classList.add('hidden');
        });

        function fetchPayments() {
            db.ref('payment_requests').on('value', snap => {
                const list = document.getElementById('paymentList'); list.innerHTML = "";
                if(!snap.exists()) { list.innerHTML = '<p class="text-center text-gray-500 py-10">কোনো রিকোয়েস্ট নেই</p>'; return; }
                snap.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `<div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 mb-4">
                        <p class="text-xs font-bold text-blue-400">Name: ${d.fullName || d.name || 'User'}</p>
                        <p class="text-[10px] text-gray-400">Email: ${d.email}</p>
                        <p class="text-sm font-black mt-1">TrxID: ${d.trxID}</p>
                        <div class="flex gap-2 mt-3"><button onclick="approveUser('${d.uid}', '${child.key}')" class="flex-1 bg-green-600 py-2 rounded-lg text-[10px] font-bold uppercase">Approve</button><button onclick="db.ref('payment_requests/${child.key}').remove()" class="bg-red-600 px-4 rounded-lg text-[10px]"><i class="fas fa-times"></i></button></div></div>`;
                });
            });
        }

        function fetchReports() {
            db.ref('reports').on('value', snap => {
                const list = document.getElementById('reportList'); list.innerHTML = "";
                if(!snap.exists()) { list.innerHTML = '<p class="text-center text-gray-500 py-10">কোনো রিপোর্ট নেই</p>'; return; }
                snap.forEach(child => {
                    const r = child.val();
                    list.innerHTML += `<div class="bg-gray-800 p-4 rounded-3xl border border-red-500/20 mb-3 flex items-start gap-3 shadow-xl">
                        <img src="${r.videoThumbnail || ''}" class="w-14 h-14 rounded-2xl object-cover bg-gray-900 border border-gray-700">
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] font-black text-red-500 uppercase tracking-tighter">By: ${r.userName || r.name || 'User'}</p>
                            <p class="text-xs font-black text-white truncate">${r.videoTitle || 'Unknown Video'}</p>
                            <p class="text-[10px] text-gray-500 mt-1 italic">Reason: ${r.reason || 'No reason'}</p>
                        </div>
                        <button onclick="db.ref('reports/${child.key}').remove()" class="text-gray-500 p-2 hover:text-green-500 transition"><i class="fas fa-check-circle text-xl"></i></button>
                    </div>`;
                });
            });
        }

        function switchMemberTab(type) {
            document.querySelectorAll('.tab-btn-member').forEach(b => b.classList.remove('active', 'text-blue-500'));
            document.getElementById('m-tab-' + type).classList.add('active', 'text-blue-500');
            db.ref('users').once('value', snap => {
                const list = document.getElementById('memberList'); list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val(), uType = u.accountType || "FREE";
                    if((type === 'premium' && uType === 'PREMIUM') || (type === 'free' && uType === 'FREE')) {
                        list.innerHTML += `<div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 flex justify-between items-center mb-2">
                            <div><p class="text-[10px] font-bold text-white">${u.fullName}</p><p class="text-[8px] text-gray-500">${u.username || u.email}</p></div>
                            <button onclick="${uType === 'FREE' ? `approveUser('${child.key}', null)` : `revokeUser('${child.key}')`}" class="text-[8px] font-black uppercase ${uType === 'FREE' ? 'bg-blue-600' : 'bg-red-600'} px-3 py-1.5 rounded-lg">${uType === 'FREE' ? 'Make PRO' : 'Make Free'}</button></div>`;
                    }
                });
            });
        }

        async function approveUser(uid, reqId) { const now = new Date(); now.setMonth(now.getMonth() + 1); await db.ref('users/' + uid).update({ accountType: 'PREMIUM', expiryDate: now.toLocaleDateString(), expiryTimestamp: now.getTime() }); if(reqId) await db.ref('payment_requests/' + reqId).remove(); alert("সফল!"); switchMemberTab('premium'); }
        async function revokeUser(uid) { if(confirm("বাতিল করবেন?")) { await db.ref('users/' + uid).update({ accountType: 'FREE', expiryDate: null, expiryTimestamp: null }); switchMemberTab('free'); } }
        function deleteVideo(id) { if(confirm("ডিলিট করবেন?")) db.ref('videos/' + id).remove(); }
        function editVideo(id, title, dur, cat, url, type) { switchTab('upload'); document.getElementById('formTitle').innerText = "Edit Mode"; document.getElementById('uploadBtn').innerText = "Update"; document.getElementById('cancelBtn').classList.remove('hidden'); document.getElementById('editId').value = id; document.getElementById('t').value = title; document.getElementById('dur').value = dur; document.getElementById('cat').value = cat.toUpperCase(); document.getElementById('v').value = url; document.getElementById('videoType').value = type || "Free"; }
        function resetForm() { document.getElementById('formTitle').innerText = "Upload Video"; document.getElementById('uploadBtn').innerText = "Publish Video"; document.getElementById('cancelBtn').classList.add('hidden'); document.getElementById('editId').value = ""; document.getElementById('t').value = ""; document.getElementById('dur').value = ""; document.getElementById('v').value = ""; document.getElementById('imageFile').value = ""; document.getElementById('fileName').innerText = "📸 Select Thumbnail"; }
        function publishNotice() { const msg = document.getElementById('notice-msg').value; if(!msg) return alert("কিছু লিখুন!"); db.ref('app_settings/notice').set({ message: msg, timestamp: Date.now() }).then(() => { const s = document.getElementById('notice-status'); s.classList.remove('hidden'); setTimeout(() => s.classList.add('hidden'), 2000); }); }
        function clearNotice() { if(confirm("মুছে ফেলবেন?")) { db.ref('app_settings/notice').remove(); document.getElementById('notice-msg').value = ""; } }
        function toggleMaintenance() { db.ref('app_settings/maintenance').once('value', s => db.ref('app_settings').update({ maintenance: !s.val() })); }
        db.ref('users').on('value', s => { document.getElementById('total-users').innerText = s.numChildren() || 0; });

        function autoClean() {
            const limit = Date.now() - (24 * 60 * 60 * 1000);
            db.ref('support_chats').once('value', snap => {
                snap.forEach(u => { u.child('messages').forEach(m => { if(m.val().timestamp < limit) m.ref.remove(); }); });
            });
        }
        setInterval(autoClean, 3600000);

        db.ref('support_chats').on('value', snap => {
            let unread = 0; const list = document.getElementById('supportUserList'); list.innerHTML = "";
            snap.forEach(child => {
                const m = child.val().meta || {}; if(m.unread) unread++;
                list.innerHTML += `<div onclick="openChat('${child.key}', '${m.userName}')" class="bg-gray-800 p-4 rounded-2xl border border-gray-700 flex justify-between items-center cursor-pointer mb-2">
                    <div class="min-w-0"><p class="text-xs font-black ${m.unread ? 'text-blue-500' : 'text-white'} uppercase">${m.userName || 'User'}</p><p class="text-[10px] text-gray-500 truncate w-48">${m.lastMsg || ''}</p></div></div>`;
            });
            const b = document.getElementById('badge-support'); if(unread > 0) { b.innerText = unread; b.classList.remove('hidden'); } else b.classList.add('hidden');
        });

        function openChat(uid, name) {
            curUid = uid; document.getElementById('s-list-view').classList.add('hidden'); document.getElementById('s-chat-view').classList.remove('hidden');
            document.getElementById('active-user-name').innerText = name;
            db.ref(`support_chats/${uid}/meta`).update({ unread: false });
            db.ref(`support_chats/${uid}/messages`).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(); const isAdm = m.sender === 'admin';
                    let content = m.type === 'image' ? `<img src="${m.content}" class="rounded-xl max-w-[200px]">` : m.content;
                    box.innerHTML += `<div class="max-w-[85%] ${isAdm ? 'self-end bg-blue-600' : 'self-start bg-gray-800 border border-gray-700'} p-3 rounded-2xl text-[12px] mb-1">${content}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
        function closeChat() { curUid = null; document.getElementById('s-list-view').classList.remove('hidden'); document.getElementById('s-chat-view').classList.add('hidden'); }
        async function sendText() { const i = document.getElementById('cInp'); if(!i.value.trim() || !curUid) return; pushMsg({ type: 'text', content: i.value, sender: 'admin', timestamp: Date.now() }); i.value = ""; }
        async function sendImage(inp) { if(!inp.files[0] || !curUid) return; const fd = new FormData(); fd.append("image", inp.files[0]); const r = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: fd }); const j = await r.json(); if(j.success) pushMsg({ type: 'image', content: j.data.url, sender: 'admin', timestamp: Date.now() }); }
        function pushMsg(msg) { db.ref(`support_chats/${curUid}/messages`).push(msg); db.ref(`support_chats/${curUid}/meta`).update({ lastMsg: msg.type === 'image' ? 'Photo' : msg.content, unread: false }); }

        db.ref('app_settings/maintenance').on('value', (s) => {
            const isM = s.val();
            const text = document.getElementById('m-status-text');
            const btn = document.getElementById('m-toggle-btn');
            if(isM) {
                text.innerText = "● Maintenance ON";
                text.classList.replace('text-green-500', 'text-red-500');
                btn.innerText = "Turn OFF";
                btn.classList.replace('bg-yellow-600', 'bg-red-600');
            } else {
                text.innerText = "● App is Live";
                text.classList.replace('text-red-500', 'text-green-500');
                btn.innerText = "Turn ON";
                btn.classList.replace('bg-red-600', 'bg-yellow-600');
            }
        });
    </script>
</body>
</html>
